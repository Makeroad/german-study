<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>독일어 학습</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #5B5BD6;
      --primary-light: #EEEEFF;
      --success:       #16A34A;
      --success-light: #DCFCE7;
      --danger:        #DC2626;
      --danger-light:  #FEE2E2;
      --warn:          #D97706;
      --warn-light:    #FEF3C7;
      --text:          #1E293B;
      --muted:         #64748B;
      --border:        #E2E8F0;
      --bg:            #F1F5F9;
      --card:          #FFFFFF;
      --sh:  0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
      --sh2: 0 4px 12px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header / Tabs ── */
    .header {
      background: var(--primary);
      color: #fff;
      padding: 14px 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--sh2);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
    .data-status { font-size: 0.72rem; color: rgba(255,255,255,.65); }
    .tabs { display: flex; }
    .tab {
      flex: 1; padding: 10px 4px 11px;
      text-align: center; font-size: 0.82rem; font-weight: 500;
      color: rgba(255,255,255,.65); cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
      user-select: none;
    }
    .tab.active { color: #fff; border-bottom-color: #fff; }

    /* ── Sections ── */
    .section { display: none; padding: 18px 14px 32px; }
    .section.active { display: block; }

    /* ── Generic ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 5px;
      padding: 13px 16px; border: none; border-radius: 12px;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: opacity .15s, transform .12s;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { opacity: .85; transform: scale(.97); }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-success  { background: var(--success-light); color: var(--success); }
    .btn-danger   { background: var(--danger-light);  color: var(--danger); }
    .btn-outline  { background: var(--card); color: var(--muted); border: 1.5px solid var(--border); }

    .section-label {
      font-size: .78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--muted); margin-bottom: 10px;
    }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .ei { font-size: 2.6rem; margin-bottom: 8px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shake  { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    .anim-in  { animation: fadeUp .28s ease both; }
    .do-shake { animation: shake .38s ease; }

    /* ══════════════════════════════════════
       VOCABULARY
    ══════════════════════════════════════ */
    .subtabs {
      display: flex; background: var(--card); border-radius: 12px;
      padding: 4px; gap: 4px; margin-bottom: 16px;
      border: 1.5px solid var(--border);
    }
    .subtab {
      flex: 1; padding: 8px 4px; text-align: center;
      font-size: .82rem; font-weight: 500; color: var(--muted);
      cursor: pointer; border-radius: 9px; transition: all .18s;
    }
    .subtab.active { background: var(--primary); color: #fff; font-weight: 700; }
    .badge {
      display: inline-block; background: var(--danger-light);
      color: var(--danger); font-size: .7rem; font-weight: 700;
      padding: 0 6px; border-radius: 99px; margin-left: 4px;
    }
    .subtab.active .badge { background: rgba(255,255,255,.25); color: #fff; }

    /* Progress */
    .prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .prog-bar { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .35s ease; }
    .prog-text { font-size: .78rem; color: var(--muted); white-space: nowrap; }

    /* Card */
    .card-stage { position: relative; height: 276px; margin-bottom: 18px; perspective: 1000px; }
    .card {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; transition: transform .45s ease;
      cursor: pointer; touch-action: manipulation;
    }
    .card.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 18px; background: var(--card);
      box-shadow: var(--sh2); padding: 26px 22px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .card-back { transform: rotateY(180deg); align-items: flex-start; justify-content: flex-start; pointer-events: none; }
    .card.flipped .card-back { pointer-events: auto; }
    .card.flipped .card-face:not(.card-back) { pointer-events: none; }
    .card-tap-hint { font-size: .72rem; color: var(--muted); margin-bottom: 10px; }
    .card-back .card-tap-hint { align-self: flex-end; }
    .cf-word { font-size: 2.4rem; font-weight: 800; color: var(--primary); text-align: center; line-height: 1.15; }
    .cb-word { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
    .cb-kr   { font-size: 1.2rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .cb-pron { font-size: .9rem; color: var(--muted); margin-bottom: 14px; }
    .cb-ex {
      width: 100%; background: var(--bg); border-radius: 10px;
      padding: 11px 13px;
    }
    .cb-ex-de { font-size: .88rem; color: var(--primary); font-style: italic; margin-bottom: 3px; }
    .cb-ex-ko { font-size: .8rem;  color: var(--muted); }

    /* Overlays */
    .card-overlay {
      position: absolute; inset: 0; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 800; opacity: 0;
      pointer-events: none; transition: opacity .1s;
    }
    .ov-know    { background: rgba(22,163,74,.15); color: var(--success); }
    .ov-dontknow{ background: rgba(220,38,38,.15);  color: var(--danger); }

    .swipe-btns { display: flex; gap: 12px; margin-bottom: 20px; }
    .swipe-btns .btn { flex: 1; font-size: 1rem; }

    /* Vocab done */
    #vocab-done { text-align: center; padding: 36px 16px; }
    #vocab-done .big-emoji { font-size: 3.2rem; margin-bottom: 10px; }
    #vocab-done h3 { font-size: 1.2rem; margin-bottom: 6px; }
    #vocab-done p { color: var(--muted); margin-bottom: 22px; }

    /* Wrong notes */
    .wn-item {
      background: var(--card); border-radius: 12px;
      padding: 13px 14px; box-shadow: var(--sh);
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .wn-de { font-size: 1.05rem; font-weight: 700; color: var(--primary); }
    .wn-kr { font-size: .82rem; color: var(--muted); }
    .wn-cnt {
      background: var(--danger-light); color: var(--danger);
      font-size: .72rem; font-weight: 700;
      padding: 3px 9px; border-radius: 99px; white-space: nowrap;
    }
    .notes-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .notes-header h3 { font-size: 1rem; font-weight: 700; }
    .btn-sm { padding: 7px 12px; font-size: .8rem; border-radius: 8px; }

    /* ══════════════════════════════════════
       CONVERSATION
    ══════════════════════════════════════ */
    .topic-row {
      display: flex; gap: 8px; overflow-x: auto;
      padding-bottom: 12px; margin-bottom: 14px;
      scrollbar-width: none;
    }
    .topic-row::-webkit-scrollbar { display: none; }
    .topic-chip {
      padding: 8px 15px; border-radius: 99px;
      background: var(--card); border: 1.5px solid var(--border);
      font-size: .82rem; white-space: nowrap; cursor: pointer;
      transition: all .15s;
    }
    .topic-chip.active {
      background: var(--primary-light); border-color: var(--primary);
      color: var(--primary); font-weight: 700;
    }

    .chat-wrap {
      background: var(--card); border-radius: 16px;
      padding: 14px 12px; min-height: 320px; max-height: 400px;
      overflow-y: auto; margin-bottom: 14px;
      display: flex; flex-direction: column; gap: 10px;
      box-shadow: var(--sh);
    }
    .bub-row { display: flex; flex-direction: column; gap: 2px; }
    .bub-row.user  { align-items: flex-end; }
    .bub-row.other { align-items: flex-start; }
    .bub-name { font-size: .7rem; color: var(--muted); padding: 0 5px; }
    .bub {
      max-width: 82%; padding: 9px 13px; border-radius: 16px;
      font-size: .92rem; line-height: 1.5;
    }
    .bub.user  { background: var(--primary); color: #fff; border-bottom-right-radius: 5px; }
    .bub.other { background: #F1F5F9; color: var(--text); border-bottom-left-radius: 5px; }
    .bub.hidden-bub {
      filter: blur(5px); user-select: none;
      background: #E2E8F0; color: #94A3B8;
    }
    .bub-tr { font-size: .76rem; color: var(--muted); padding: 0 5px; }
    .bub-row.user .bub-tr { text-align: right; }

    .conv-controls { display: flex; flex-direction: column; gap: 8px; }
    .conv-fb {
      padding: 10px 13px; border-radius: 10px;
      font-size: .88rem; font-weight: 600; display: none;
    }
    .conv-fb.ok  { background: var(--success-light); color: var(--success); display: block; }
    .conv-fb.err { background: var(--danger-light);  color: var(--danger);  display: block; }
    .conv-input-row { display: flex; gap: 8px; }
    .conv-input {
      flex: 1; padding: 11px 13px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .92rem; outline: none; transition: border-color .2s;
      background: var(--card);
    }
    .conv-input:focus { border-color: var(--primary); }
    .conv-hint-row { display: flex; gap: 8px; }
    .conv-hint-row .btn { flex: 1; }

    /* Conv done */
    .conv-done {
      text-align: center; padding: 14px;
      background: var(--success-light); border-radius: 12px;
      color: var(--success); font-weight: 700;
    }

    /* ══════════════════════════════════════
       QUIZ
    ══════════════════════════════════════ */
    .quiz-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .quiz-score-lbl { font-size: .88rem; font-weight: 700; color: var(--primary); }
    .quiz-prog-lbl  { font-size: .78rem; color: var(--muted); }

    .quiz-card {
      background: var(--card); border-radius: 18px;
      padding: 22px 20px; box-shadow: var(--sh2); margin-bottom: 14px;
    }
    .qtype-badge {
      display: inline-block; font-size: .72rem; font-weight: 700;
      padding: 3px 10px; border-radius: 99px; margin-bottom: 12px;
    }
    .qtype-fill  { background: var(--warn-light);    color: var(--warn); }
    .qtype-multi { background: var(--primary-light); color: var(--primary); }
    .quiz-q { font-size: 1.15rem; font-weight: 700; line-height: 1.4; margin-bottom: 5px; }
    .quiz-hint-lbl { font-size: .82rem; color: var(--muted); margin-bottom: 18px; }

    .fill-input {
      width: 100%; padding: 13px; border: 2px solid var(--border);
      border-radius: 11px; font-size: 1rem; text-align: center;
      outline: none; transition: border-color .2s; background: var(--card);
    }
    .fill-input:focus { border-color: var(--primary); }
    .fill-input.ok  { border-color: var(--success); background: var(--success-light); }
    .fill-input.err { border-color: var(--danger);  background: var(--danger-light); }

    .options { display: flex; flex-direction: column; gap: 9px; }
    .opt {
      padding: 13px 15px; border: 2px solid var(--border);
      border-radius: 11px; font-size: .95rem;
      cursor: pointer; text-align: left; background: var(--card);
      transition: border-color .15s, background .15s;
    }
    .opt:not(:disabled):hover { border-color: var(--primary); background: var(--primary-light); }
    .opt.ok  { border-color: var(--success); background: var(--success-light); color: var(--success); font-weight: 700; }
    .opt.err { border-color: var(--danger);  background: var(--danger-light);  color: var(--danger); }
    .opt:disabled { cursor: default; }

    .quiz-result-lbl {
      padding: 11px 14px; border-radius: 11px;
      font-size: .92rem; font-weight: 700;
      margin-bottom: 14px; display: none;
    }
    .quiz-result-lbl.ok  { background: var(--success-light); color: var(--success); display: block; }
    .quiz-result-lbl.err { background: var(--danger-light);  color: var(--danger);  display: block; }
    .quiz-nav { display: flex; gap: 10px; }
    .quiz-nav .btn { flex: 1; }

    /* Final */
    .final-wrap { text-align: center; padding: 40px 20px; }
    .final-score { font-size: 3.8rem; font-weight: 800; color: var(--primary); line-height: 1; }
    .final-max   { font-size: 1rem; color: var(--muted); margin-bottom: 6px; }
    .final-msg   { font-size: 1.05rem; margin-bottom: 26px; }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="header">
  <div class="header-top">
    <div class="header-title">🇩🇪 독일어 학습</div>
    <div class="data-status" id="data-status">데이터 로딩 중…</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('vocab')">📚 단어장</div>
    <div class="tab"        onclick="switchTab('conv')">💬 회화</div>
    <div class="tab"        onclick="switchTab('quiz')">✏️ 퀴즈</div>
  </div>
</div>

<!-- ══ VOCAB ══ -->
<div id="vocab" class="section active">
  <div class="subtabs">
    <div class="subtab active" onclick="switchVocabTab('cards')">단어 카드</div>
    <div class="subtab"        onclick="switchVocabTab('notes')">오답 노트 <span class="badge" id="wrong-badge">0</span></div>
  </div>

  <!-- Cards panel -->
  <div id="vocab-cards-panel">
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" id="vp-fill" style="width:0%"></div></div>
      <div class="prog-text" id="vp-text">0 / 0</div>
    </div>

    <div class="card-stage" id="card-stage">
      <div class="card-overlay ov-know"     id="ov-know">✓ 알아요!</div>
      <div class="card-overlay ov-dontknow" id="ov-dont">✗ 몰라요</div>
      <div class="card" id="flashcard" onclick="flipCard()">
        <div class="card-face">
          <div class="card-tap-hint">탭하여 뒤집기</div>
          <div class="cf-word" id="cf-word"></div>
        </div>
        <div class="card-face card-back">
          <div class="card-tap-hint">탭하여 앞으로</div>
          <div class="cb-word" id="cb-word"></div>
          <div class="cb-kr"   id="cb-kr"></div>
          <div class="cb-pron" id="cb-pron"></div>
          <div class="cb-ex">
            <div class="cb-ex-de" id="cb-ex-de"></div>
            <div class="cb-ex-ko" id="cb-ex-ko"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="swipe-btns" id="swipe-btns">
      <button class="btn btn-danger"  onclick="judgeCard(false)">✗ 몰라요</button>
      <button class="btn btn-success" onclick="judgeCard(true)">✓ 알아요</button>
    </div>

    <div id="vocab-done" style="display:none">
      <div class="big-emoji">🎉</div>
      <h3>오늘 단어 완료!</h3>
      <p>오답 노트를 확인하거나 다시 시작해보세요.</p>
      <button class="btn btn-primary" onclick="resetVocab()">다시 시작</button>
    </div>
  </div>

  <!-- Notes panel -->
  <div id="vocab-notes-panel" style="display:none">
    <div class="notes-header">
      <h3>오답 노트</h3>
      <button class="btn btn-outline btn-sm" onclick="clearWrongNotes()">초기화</button>
    </div>
    <div id="wn-list"></div>
  </div>
</div>

<!-- ══ CONVERSATION ══ -->
<div id="conv" class="section">
  <div class="topic-row" id="topic-row"></div>
  <div class="chat-wrap" id="chat-wrap"></div>
  <div class="conv-controls">
    <div class="conv-fb" id="conv-fb"></div>
    <div class="conv-input-row" id="conv-input-row">
      <input class="conv-input" id="conv-input" type="text" placeholder="독일어로 입력하세요…" autocomplete="off">
      <button class="btn btn-primary" onclick="checkConvAnswer()" style="flex:none;padding:11px 15px">확인</button>
    </div>
    <div class="conv-hint-row" id="conv-hint-row">
      <button class="btn btn-outline" onclick="revealConvLine()">힌트 보기</button>
      <button class="btn btn-primary" id="conv-next-btn" onclick="nextConvLine()">다음 ▶</button>
    </div>
    <div class="conv-done" id="conv-done" style="display:none">
      대화 완료! 🎊<br>
      <button class="btn btn-outline btn-sm" onclick="restartConv()" style="margin-top:10px">처음부터 다시</button>
    </div>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div id="quiz" class="section">
  <div class="quiz-meta">
    <div class="quiz-score-lbl" id="quiz-score-lbl">0점</div>
    <div class="quiz-prog-lbl"  id="quiz-prog-lbl">1 / 0</div>
  </div>
  <div id="quiz-card" class="quiz-card anim-in">
    <div id="q-type-badge" class="qtype-badge"></div>
    <div id="q-question"   class="quiz-q"></div>
    <div id="q-hint"       class="quiz-hint-lbl"></div>
    <div id="q-body"></div>
  </div>
  <div id="quiz-result-lbl" class="quiz-result-lbl"></div>
  <div class="quiz-nav" id="quiz-nav">
    <button class="btn btn-outline" onclick="skipQuiz()">건너뛰기</button>
    <button class="btn btn-primary" id="quiz-next-btn" onclick="nextQuiz()" style="display:none">다음 문제 ▶</button>
  </div>
  <div id="quiz-final" class="final-wrap" style="display:none">
    <div class="final-score" id="final-score"></div>
    <div class="final-max"   id="final-max"></div>
    <div class="final-msg"   id="final-msg"></div>
    <button class="btn btn-primary" onclick="resetQuiz()">다시 풀기</button>
  </div>
</div>

<script>
/* ============================================================
   CONFIGURATION
   GitHub Raw URL 예시:
   https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/data.json
   배포 후 아래 GITHUB_RAW_URL을 실제 URL로 교체하세요.
   더미 데이터로 동작 중일 때는 그대로 두면 됩니다.
============================================================ */
const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/Makeroad/german-study/main/word.json';
const LS_DATA       = 'de_study_data';
const LS_DATA_TIME  = 'de_study_data_ts';
const LS_WRONG      = 'de_wrong_notes';

/* ============================================================
   DUMMY DATA (GitHub fetch 실패 시 폴백)
============================================================ */
const DUMMY = {
  vocabulary: [
    { id:1,  german:"Hallo",          korean:"안녕하세요",           pronunciation:"할로",      example:{ german:"Hallo, wie geht es dir?",                   korean:"안녕, 어떻게 지내?" } },
    { id:2,  german:"Danke",          korean:"감사합니다",           pronunciation:"당케",      example:{ german:"Danke schön für deine Hilfe!",              korean:"도와줘서 정말 감사해요!" } },
    { id:3,  german:"Entschuldigung", korean:"실례합니다 / 죄송합니다", pronunciation:"엔트슐디궁", example:{ german:"Entschuldigung, wo ist der Bahnhof?",      korean:"실례합니다, 기차역이 어디 있나요?" } },
    { id:4,  german:"Bitte",          korean:"부탁합니다 / 천만에요", pronunciation:"비테",      example:{ german:"Ein Kaffee, bitte.",                        korean:"커피 한 잔 부탁해요." } },
    { id:5,  german:"Wasser",         korean:"물",                  pronunciation:"바서",      example:{ german:"Kann ich bitte ein Glas Wasser haben?",     korean:"물 한 잔 주실 수 있나요?" } },

   STATE
============================================================ */
let DATA = null;

// Vocab
let vCards = [], vIdx = 0, vFlipped = false;
let wrongNotes = {};

// Conv
let cTopicIdx = 0, cLineIdx = 0, cRevealed = false;

// Quiz
let qItems = [], qIdx = 0, qScore = 0, qAnswered = false;

/* ============================================================
   INIT
============================================================ */
async function init() {
  wrongNotes = JSON.parse(localStorage.getItem(LS_WRONG) || '{}');
  DATA = await loadData();
  initVocab();
  initConv();
  initQuiz();
  initFlipTouch();
}

async function loadData() {
  // Check 24h cache
  const cached = localStorage.getItem(LS_DATA);
  const ts     = parseInt(localStorage.getItem(LS_DATA_TIME) || '0');
  if (cached && Date.now() - ts < 86_400_000) {
    try {
      setStatus('캐시 데이터', true);
      return JSON.parse(cached);
    } catch {}
  }

  // Fetch from GitHub
  if (GITHUB_RAW_URL) {
    try {
      const res = await fetch(GITHUB_RAW_URL);
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem(LS_DATA,      JSON.stringify(data));
        localStorage.setItem(LS_DATA_TIME, Date.now().toString());
        setStatus('GitHub 최신 데이터', true);
        return data;
      }
    } catch { /* fall through */ }
  }

  setStatus('더미 데이터', false);
  return DUMMY;
}

function setStatus(label, ok) {
  const el = document.getElementById('data-status');
  el.textContent = ok ? `✓ ${label}` : `⚠ ${label}`;
  el.style.color = ok ? 'rgba(255,255,255,.75)' : '#FCD34D';
}

============================================================ */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['vocab','conv','quiz'][i] === name));
  document.querySelectorAll('.section').forEach(s =>
    s.classList.toggle('active', s.id === name));
}

function switchVocabTab(name) {
  document.querySelectorAll('.subtab').forEach((t, i) =>
    t.classList.toggle('active', ['cards','notes'][i] === name));
  document.getElementById('vocab-cards-panel').style.display = name === 'cards' ? '' : 'none';
  document.getElementById('vocab-notes-panel').style.display = name === 'notes' ? '' : 'none';
  if (name === 'notes') renderWrongNotes();

/* ============================================================
   VOCABULARY
============================================================ */
function initVocab() {
  vCards   = [...(DATA.vocabulary || [])];
  vIdx     = 0;
  vFlipped = false;
  renderVocabCard();
  updateWrongBadge();
}

function renderVocabCard() {
  const total = vCards.length;
  document.getElementById('vp-fill').style.width = total ? `${(vIdx / total) * 100}%` : '0%';
  document.getElementById('vp-text').textContent  = `${vIdx} / ${total}`;

  const done    = document.getElementById('vocab-done');
  const stage   = document.getElementById('card-stage');
  const swipeBt = document.getElementById('swipe-btns');

  if (vIdx >= total) {
    done.style.display    = 'block';
    stage.style.display   = 'none';
    swipeBt.style.display = 'none';
    return;
  }

  done.style.display    = 'none';
  stage.style.display   = 'block';
  swipeBt.style.display = 'flex';

  const c = vCards[vIdx];
  document.getElementById('cf-word').textContent   = c.word;
  document.getElementById('cb-word').textContent   = c.word;
  document.getElementById('cb-kr').textContent     = c.korean || c.meaning || '';
  document.getElementById('cb-pron').textContent   = `[${c.pronunciation}]`;
  document.getElementById('cb-ex-de').textContent = c.example;
  document.getElementById('cb-ex-ko').textContent = c.example_translation;

  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped');
  vFlipped = false;
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
  vFlipped = !vFlipped;
}

function initFlipTouch() {
  let startX, startY;
  const fc = document.getElementById('flashcard');
  fc.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });
  fc.addEventListener('touchend', e => {
    const dx = Math.abs(e.changedTouches[0].clientX - startX);
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if (dx < 10 && dy < 10) { e.preventDefault(); flipCard(); }
  });
}

function judgeCard(know) {
  const c = vCards[vIdx];
  const key = c.id || c.word;

  if (!know) {
    if (!wrongNotes[key]) wrongNotes[key] = { ...c, count: 0 };
    wrongNotes[key].count++;
  } else if (wrongNotes[key]) {
    wrongNotes[key].count = Math.max(0, wrongNotes[key].count - 1);
    if (wrongNotes[key].count === 0) delete wrongNotes[key];
  }
  localStorage.setItem(LS_WRONG, JSON.stringify(wrongNotes));
  updateWrongBadge();

  const ov = document.getElementById(know ? 'ov-know' : 'ov-dont');
  ov.style.opacity = '1';
  setTimeout(() => { ov.style.opacity = '0'; vIdx++; renderVocabCard(); }, 380);
}

function resetVocab() { vIdx = 0; renderVocabCard(); }

function updateWrongBadge() {
  document.getElementById('wrong-badge').textContent = Object.keys(wrongNotes).length;
}

function renderWrongNotes() {
  const el    = document.getElementById('wn-list');
  const notes = Object.values(wrongNotes).sort((a, b) => b.count - a.count);
  if (!notes.length) {
    el.innerHTML = '<div class="empty-state"><div class="ei">🎯</div><div>아직 오답이 없어요!</div></div>';
    return;
  }
  el.innerHTML = notes.map(n => `
    <div class="wn-item">
      <div>
        <div class="wn-de">${n.word}</div>
        <div class="wn-kr">${n.korean || n.meaning || ''} [${n.pronunciation}]</div>
      </div>
      <div class="wn-cnt">틀린 횟수 ${n.count}</div>
    </div>`).join('');
}

function clearWrongNotes() {
  if (!Object.keys(wrongNotes).length) return;
  wrongNotes = {};
  localStorage.removeItem(LS_WRONG);
  updateWrongBadge();
  renderWrongNotes();
}

/* ── Swipe gesture ── */
(function () {
  let sx = 0, sy = 0, drag = false;
  const stage = document.getElementById('card-stage');

  stage.addEventListener('pointerdown', e => {
    if (e.target.closest('button')) return;
    sx = e.clientX; sy = e.clientY; drag = true;
    stage.setPointerCapture(e.pointerId);
  });

  stage.addEventListener('pointermove', e => {
    if (!drag) return;
    const dx = e.clientX - sx;
    const fc = document.getElementById('flashcard');
    const base = vFlipped ? 'rotateY(180deg) ' : '';
    fc.style.transition = 'none';
    fc.style.transform  = `${base}translateX(${dx * 0.4}px) rotate(${dx * 0.025}deg)`;
    document.getElementById('ov-know').style.opacity = dx > 20 ? Math.min((dx - 20) / 90, 1) : 0;
    document.getElementById('ov-dont').style.opacity = dx < -20 ? Math.min((-dx - 20) / 90, 1) : 0;
  });

  function pointerEnd(e) {
    if (!drag) return;
    drag = false;
    const dx = e.clientX - sx;
    const dy = e.clientY - sy;
    const fc = document.getElementById('flashcard');
    fc.style.transition = '';
    fc.style.transform  = vFlipped ? 'rotateY(180deg)' : '';
    document.getElementById('ov-know').style.opacity = 0;
    document.getElementById('ov-dont').style.opacity = 0;
    // Swipe threshold: horizontal dominant + >60px
    if (Math.abs(dx) > Math.abs(dy) * 1.4 && Math.abs(dx) > 60) judgeCard(dx > 0);
  }

  stage.addEventListener('pointerup',     pointerEnd);
  stage.addEventListener('pointercancel', pointerEnd);
})();

/* ============================================================
   CONVERSATION
============================================================ */
function initConv() {
  const row = document.getElementById('topic-row');
  const convs = DATA.conversations || [];
  row.innerHTML = convs.map((c, i) =>
    `<div class="topic-chip ${i === 0 ? 'active' : ''}" onclick="selectTopic(${i})">${c.title}</div>`
  ).join('');
  cTopicIdx = 0; cLineIdx = 0; cRevealed = false;
  if (convs.length) renderConv();
}

function selectTopic(i) {
  document.querySelectorAll('.topic-chip').forEach((c, j) => c.classList.toggle('active', j === i));
  cTopicIdx = i; cLineIdx = 0; cRevealed = false;
  document.getElementById('conv-fb').className = 'conv-fb';
  document.getElementById('conv-input').value = '';
  renderConv();
}

function renderConv() {
  const conv  = DATA.conversations[cTopicIdx];
  const lines = conv.lines;
  const chat  = document.getElementById('chat-wrap');

  let html = '';
  for (let i = 0; i <= Math.min(cLineIdx, lines.length - 1); i++) {
    const ln   = lines[i];
    const isMe = ln.role === 'user';
    const cls  = isMe ? 'user' : 'other';

    if (i < cLineIdx || cRevealed) {
      // Revealed line
      html += `
        <div class="bub-row ${cls} anim-in">
          <div class="bub-name">${ln.speaker}</div>
          <div class="bub ${cls}">${ln.word}</div>
          <div class="bub-tr">${ln.korean}</div>
        </div>`;
    } else {
      // Current line — German blurred, Korean shown as hint
      html += `
        <div class="bub-row ${cls} anim-in">
          <div class="bub-name">${ln.speaker}</div>
          <div class="bub ${cls} hidden-bub">${ln.word}</div>
          <div class="bub-tr">${ln.korean}</div>
        </div>`;
    }
  }
  if (!html) html = '<div class="empty-state" style="margin:auto"><div class="ei">💬</div><div>첫 번째 대사를 맞춰보세요!</div></div>';
  chat.innerHTML = html;
  chat.scrollTop = chat.scrollHeight;

  // Controls visibility
  const done      = cLineIdx >= lines.length;
  document.getElementById('conv-input-row').style.display  = done ? 'none' : 'flex';
  document.getElementById('conv-hint-row').style.display   = done ? 'none' : 'flex';
  document.getElementById('conv-done').style.display       = done ? 'block' : 'none';
  if (!done) {
    const cur = lines[cLineIdx];
    document.getElementById('conv-input').placeholder =
      `${cur.speaker}의 독일어 대사를 입력하세요…`;
  }
}

function checkConvAnswer() {
  const conv = DATA.conversations[cTopicIdx];
  if (cLineIdx >= conv.lines.length) return;
  const val = document.getElementById('conv-input').value.trim();
  if (!val) return;

  const cur       = conv.lines[cLineIdx];
  const normalize = s => s.toLowerCase().replace(/[!?,.'";]/g, '').trim();
  const fb        = document.getElementById('conv-fb');

  if (normalize(val) === normalize(cur.word)) {
    fb.className   = 'conv-fb ok';
    fb.textContent = '정답입니다! ';
    cRevealed      = true;
    renderConv();
  } else {
    fb.className   = 'conv-fb err';
    fb.textContent = `틀렸어요 — 정답: "${cur.word}"`;
    const inp = document.getElementById('conv-input');
    inp.classList.remove('do-shake');
    void inp.offsetWidth;
    inp.classList.add('do-shake');
  }
}

function revealConvLine() {
  cRevealed = true;
  document.getElementById('conv-fb').className = 'conv-fb';
  renderConv();
}

function nextConvLine() {
  const len = DATA.conversations[cTopicIdx].lines.length;
  cRevealed = false;
  cLineIdx  = Math.min(cLineIdx + 1, len);
  document.getElementById('conv-fb').className = 'conv-fb';
  document.getElementById('conv-input').value  = '';
  renderConv();
}

function restartConv() { selectTopic(cTopicIdx); }

document.getElementById('conv-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkConvAnswer();
});

function initQuiz() {
  qItems    = shuffle([...(DATA.quizzes || [])]);
  qIdx      = 0;
  qScore    = 0;
  qAnswered = false;
  document.getElementById('quiz-card').style.display      = 'block';
  document.getElementById('quiz-result-lbl').className    = 'quiz-result-lbl';
  document.getElementById('quiz-nav').style.display       = 'flex';
  document.getElementById('quiz-final').style.display     = 'none';
  renderQuiz();
}

function renderQuiz() {
  const total = qItems.length;
  document.getElementById('quiz-score-lbl').textContent = `${qScore}점`;
  document.getElementById('quiz-result-lbl').className  = 'quiz-result-lbl';
  document.getElementById('quiz-next-btn').style.display = 'none';
  qAnswered = false;

  if (!total) {
    document.getElementById('quiz-prog-lbl').textContent = '0 / 0';
    document.getElementById('q-type-badge').textContent  = '';
    document.getElementById('q-question').textContent    = '퀴즈 데이터가 없습니다.';
    document.getElementById('q-hint').textContent        = '';
    document.getElementById('q-body').innerHTML          = '';
    return;
  }

  document.getElementById('quiz-prog-lbl').textContent  = `${qIdx + 1} / ${total}`;

  const q    = qItems[qIdx];
  const badge = document.getElementById('q-type-badge');
  badge.className   = `qtype-badge ${q.type === 'fill' ? 'qtype-fill' : 'qtype-multi'}`;
  badge.textContent = q.type === 'fill' ? '빈칸 채우기' : '4지선다';

  if (q.type === 'fill') {
    document.getElementById('q-question').textContent = q.sentence;
    document.getElementById('q-hint').textContent     = q.hint || '';
    document.getElementById('q-body').innerHTML =
      `<input class="fill-input" id="fill-input" type="text" placeholder="빈칸을 채우세요" autocomplete="off">`;
    document.getElementById('fill-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitFill();
    });
    setTimeout(() => document.getElementById('fill-input').focus(), 50);
  } else {
    document.getElementById('q-question').textContent = q.question;
    document.getElementById('q-hint').textContent     = '';
    document.getElementById('q-body').innerHTML = `<div class="options">${
      q.options.map((o, i) =>
        `<button class="opt" onclick="selectOpt(${i})">${o}</button>`
      ).join('')
    }</div>`;
  }

  const card = document.getElementById('quiz-card');
  card.classList.remove('anim-in');
  void card.offsetWidth;
  card.classList.add('anim-in');
}

function submitFill() {
  if (qAnswered) return;
  const q   = qItems[qIdx];
  const inp = document.getElementById('fill-input');
  const val = inp.value.trim();
  if (!val) return;

  const ok = val.toLowerCase() === q.answer.toLowerCase();
  inp.classList.add(ok ? 'ok' : 'err');
  inp.disabled = true;
  showQuizResult(ok, q.answer);
}

function selectOpt(i) {
  if (qAnswered) return;
  qAnswered = true;
  const q    = qItems[qIdx];
  document.querySelectorAll('.opt').forEach((b, j) => {
    b.disabled = true;
    if (j === q.answer) b.classList.add('ok');
    if (j === i && i !== q.answer) b.classList.add('err');
  });
  showQuizResult(i === q.answer, q.options[q.answer]);
}

function showQuizResult(ok, answer) {
  qAnswered = true;
  if (ok) qScore += 10;
  document.getElementById('quiz-score-lbl').textContent = `${qScore}점`;

  const lbl = document.getElementById('quiz-result-lbl');
  lbl.className   = `quiz-result-lbl ${ok ? 'ok' : 'err'}`;
  lbl.textContent = ok ? '정답! +10점 🎉' : `오답 — 정답: ${answer}`;

  document.getElementById('quiz-next-btn').style.display = 'block';
}

function skipQuiz()  { advance(); }
function nextQuiz()  { advance(); }

function advance() {
  if (qIdx < qItems.length - 1) { qIdx++; renderQuiz(); }
  else showFinalScore();
}

function showFinalScore() {
  const max = qItems.length * 10;
  const pct = Math.round((qScore / max) * 100);
  document.getElementById('quiz-card').style.display   = 'none';
  document.getElementById('quiz-result-lbl').className = 'quiz-result-lbl';
  document.getElementById('quiz-nav').style.display    = 'none';
  document.getElementById('quiz-final').style.display  = 'block';
  document.getElementById('final-score').textContent   = qScore;
  document.getElementById('final-max').textContent     = `/ ${max}점`;
  document.getElementById('final-msg').textContent     =
    pct >= 90 ? '완벽해요! 🏆' :
    pct >= 70 ? '잘 했어요! 👍' :
    pct >= 50 ? '조금만 더 연습해요! 💪' : '다시 도전해봐요! 🔄';
}

function resetQuiz() { initQuiz(); }

/* ============================================================
   UTILS
============================================================ */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ── Start ── */
init();
