<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>독일어 학습</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ HEADER ══ -->
<div class="header">
  <div class="header-top">
    <div class="header-title">🇩🇪 독일어 학습</div>
    <div class="data-status" id="data-status">데이터 로딩 중…</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('vocab')">📚 단어장</div>
    <div class="tab"        onclick="switchTab('conv')">💬 회화</div>
    <div class="tab"        onclick="switchTab('quiz')">✏️ 퀴즈</div>
  </div>
</div>

<!-- ══ VOCAB ══ -->
<div id="vocab" class="section active">
  <div class="subtabs">
    <div class="subtab active" onclick="switchVocabTab('cards')">단어 카드</div>
    <div class="subtab"        onclick="switchVocabTab('notes')">오답 노트 <span class="badge" id="wrong-badge">0</span></div>
  </div>

  <!-- Cards panel -->
  <div id="vocab-cards-panel">
    <div class="day-filter" id="day-filter"></div>
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" id="vp-fill" style="width:0%"></div></div>
      <div class="prog-text" id="vp-text">0 / 0</div>
    </div>

    <div class="card-stage" id="card-stage">
      <div class="card-overlay ov-know"     id="ov-know">✓ 알아요!</div>
      <div class="card-overlay ov-dontknow" id="ov-dont">✗ 몰라요</div>
      <div class="card" id="flashcard">
        <div class="card-face">
          <div class="card-tap-hint">탭하여 뒤집기</div>
          <div class="cf-word" id="cf-word"></div>
        </div>
        <div class="card-face card-back">
          <div class="card-tap-hint">탭하여 앞으로</div>
          <div class="cb-word" id="cb-word"></div>
          <div class="cb-kr"   id="cb-kr"></div>
          <div class="cb-pron" id="cb-pron"></div>
          <div class="cb-ex">
            <div class="cb-ex-de" id="cb-ex-de"></div>
            <div class="cb-ex-ko" id="cb-ex-ko"></div>
          </div>
        </div>
      </div>
      <div id="card-tap-overlay"></div>
    </div>

    <div class="swipe-btns" id="swipe-btns">
      <button class="btn btn-danger"  onclick="judgeCard(false)">✗ 몰라요</button>
      <button class="btn btn-success" onclick="judgeCard(true)">✓ 알아요</button>
    </div>

    <div id="vocab-done" style="display:none">
      <div class="big-emoji">🎉</div>
      <h3>오늘 단어 완료!</h3>
      <p>오답 노트를 확인하거나 다시 시작해보세요.</p>
      <button class="btn btn-primary" onclick="resetVocab()">다시 시작</button>
    </div>
  </div>

  <!-- Notes panel -->
  <div id="vocab-notes-panel" style="display:none">
    <div class="notes-header">
      <h3>오답 노트</h3>
      <button class="btn btn-outline btn-sm" onclick="clearWrongNotes()">초기화</button>
    </div>
    <div id="wn-list"></div>
  </div>
</div>

<!-- ══ CONVERSATION ══ -->
<div id="conv" class="section">
  <div class="topic-row" id="topic-row"></div>
  <div class="chat-wrap" id="chat-wrap"></div>
  <div class="conv-controls">
    <div class="conv-fb" id="conv-fb"></div>
    <div class="conv-input-row" id="conv-input-row">
      <input class="conv-input" id="conv-input" type="text" placeholder="독일어로 입력하세요…" autocomplete="off">
      <button class="btn btn-primary" onclick="checkConvAnswer()" style="flex:none;padding:11px 15px">확인</button>
    </div>
    <div class="conv-hint-row" id="conv-hint-row">
      <button class="btn btn-outline" onclick="revealConvLine()">힌트 보기</button>
      <button class="btn btn-primary" id="conv-next-btn" onclick="nextConvLine()">다음 ▶</button>
    </div>
    <div class="conv-done" id="conv-done" style="display:none">
      대화 완료! 🎊<br>
      <button class="btn btn-outline btn-sm" onclick="restartConv()" style="margin-top:10px">처음부터 다시</button>
    </div>
  </div>
</div>

<!-- ══ QUIZ ══ -->
<div id="quiz" class="section">
  <div class="quiz-meta">
    <div class="quiz-score-lbl" id="quiz-score-lbl">0점</div>
    <div class="quiz-prog-lbl"  id="quiz-prog-lbl">1 / 0</div>
  </div>
  <div id="quiz-card" class="quiz-card anim-in">
    <div id="q-type-badge" class="qtype-badge"></div>
    <div id="q-question"   class="quiz-q"></div>
    <div id="q-hint"       class="quiz-hint-lbl"></div>
    <div id="q-body"></div>
  </div>
  <div id="quiz-result-lbl" class="quiz-result-lbl"></div>
  <div class="quiz-nav" id="quiz-nav">
    <button class="btn btn-outline" onclick="skipQuiz()">건너뛰기</button>
    <button class="btn btn-primary" id="quiz-next-btn" onclick="nextQuiz()" style="display:none">다음 문제 ▶</button>
  </div>
  <div id="quiz-final" class="final-wrap" style="display:none">
    <div class="final-score" id="final-score"></div>
    <div class="final-max"   id="final-max"></div>
    <div class="final-msg"   id="final-msg"></div>
    <button class="btn btn-primary" onclick="resetQuiz()">다시 풀기</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
